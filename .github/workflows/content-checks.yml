name: Content checks (Tabstack)

# Verifies content against authoritative sources on PRs that touch content,
# and on a weekly schedule to catch link rot and spec promotions.
on:
  pull_request:
    paths:
      - 'src/content/**'
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

env:
  TABSTACK_API_KEY: ${{ secrets.TABSTACK_API_KEY }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # factcheck diffs against the base branch

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # TODO: replace with the official Tabstack CLI install command.
      # The binary is a standalone executable (not npm/brew); grab the Linux
      # build from Tabstack's releases and put it on PATH. See docs.tabstack.ai.
      - name: Install Tabstack CLI
        run: |
          echo "::error::Set the real Tabstack CLI install command before enabling this workflow"
          exit 1

      - name: Gap detection (advisory)
        run: npm run check:gaps || true

      - name: Link + staleness check
        run: npm run check:links

      - name: Fact-check changed content
        if: github.event_name == 'pull_request'
        env:
          FACTCHECK_BASE: origin/${{ github.base_ref }}
        run: npm run factcheck
